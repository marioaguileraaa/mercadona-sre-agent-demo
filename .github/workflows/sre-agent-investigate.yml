name: SRE Agent controlled investigation

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      syntheticIncidentId:
        description: Synthetic incident identifier
        required: true
        type: string

permissions:
  contents: read
  issues: read

jobs:
  investigate:
    if: >-
      (
        github.event_name == 'workflow_dispatch' &&
        startsWith(inputs.syntheticIncidentId, 'SYNTH-')
      ) ||
      (
        github.event_name == 'issues' &&
        startsWith(github.event.issue.title, '[SYNTHETIC]') &&
        github.event.label.name == 'sre-investigate'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Build safe trigger payload
        env:
          EVENT_NAME: ${{ github.event_name }}
          SYNTHETIC_INCIDENT_ID: ${{ inputs.syntheticIncidentId }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          jq -n \
            --arg source "$EVENT_NAME" \
            --arg syntheticIncidentId "$SYNTHETIC_INCIDENT_ID" \
            --arg repository "$REPOSITORY" \
            --arg issueNumber "$ISSUE_NUMBER" \
            --arg title "$ISSUE_TITLE" \
            --arg body "$ISSUE_BODY" \
            --arg url "$ISSUE_URL" \
            '{
              source: $source,
              syntheticIncidentId: $syntheticIncidentId,
              repository: $repository,
              issueNumber: $issueNumber,
              title: $title,
              body: $body,
              url: $url,
              dataClassification: "synthetic"
            }' > "$RUNNER_TEMP/sre-payload.json"

      - name: Trigger Review-mode investigation
        env:
          SRE_TRIGGER_URL: ${{ secrets.SRE_TRIGGER_URL }}
        run: |
          status="$(curl --silent --show-error \
            --output "$RUNNER_TEMP/sre-response.json" \
            --write-out '%{http_code}' \
            --request POST "$SRE_TRIGGER_URL" \
            --header "Content-Type: application/json" \
            --data-binary "@$RUNNER_TEMP/sre-payload.json")"
          test "$status" = "202" || {
            cat "$RUNNER_TEMP/sre-response.json"
            exit 1
          }
          jq -e '.success == true and (.threadId | type == "string" and length > 0)' \
            "$RUNNER_TEMP/sre-response.json"
